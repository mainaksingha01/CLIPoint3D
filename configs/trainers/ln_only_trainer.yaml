DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 20
  TRAIN_U:
    BATCH_SIZE: 20
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 8


OPTIM:
  NAME: "adam"
  LR: 0.001
  MAX_EPOCH: 50
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 5

TEST:
  PER_CLASS_RESULT: True

MODEL:
  NAME: CLIPoint3D
  BACKBONE:
    NAME: "ViT-B/16"

TRAINER:
  NAME: "LayerNormOnlyTrainer"
  MODEL:
    N_CTX: 4
    CTX_INIT: ""
    PREC: "fp32"
  USE_ALIGN_LOSS: False
  USE_SINKHORN_LOSS: True
  USE_PROTOTYPE_LOSS: True
  USE_KL_LOSS: False
  USE_W1_LOSS: False
  USE_ENTROPY_LOSS: True
